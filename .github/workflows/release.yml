name: Publish Docker image

on:
  push:
    branches:
      - master
  release:
    types: [published]

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: benji42/hc-tcg

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}

  publish_to_fly:
    name: Run script
    runs-on: ubuntu-latest
    # needs: [push_to_registry]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - run: |
            curl -X POST https://discord.com/api/v10/channels/${{ secrets.DISCORD_CHANNEL }}/messages -D "{\"content\": \"${{ github.event.release.body }}\"}" -H "Authorization: Bot ${{ secrets.BOT_KEY }}" -H "Content-Type: application/json" || true
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
